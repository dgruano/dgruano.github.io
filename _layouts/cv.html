<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <style>
    .cv {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 1em;
      line-height: 1.5;
      color: #222;
    }

    /* ── Header ── */
    .cv-header {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .cv-header-text { flex: 1; min-width: 200px; }

    .cv-header-text h1 {
      font-size: 1.73em;
      font-weight: 700;
      color: #a21f3e;
      margin: 0 0 0.15em;
      border: none;
    }

    .cv-subtitle {
      font-size: 1em;
      font-weight: 400;
      color: #444;
      margin: 0 0 0.4em;
    }

    .cv-contact {
      font-size: 0.875em;
      color: #666;
      margin: 0 0 0.8em;
    }

    .cv-photo {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* ── Download button ── */
    .cv-download {
      display: inline-block;
      font-size: 0.875em;
      padding: 5px 13px;
      background: #a21f3e;
      color: #fff !important;
      border-radius: 4px;
      text-decoration: none !important;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: background 0.15s;
    }
    .cv-download:hover { background: #8a1a34; }

    /* ── Section headers ── */
    .cv h2 {
      font-size: 1em;
      font-style: normal;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #a21f3e;
      border: none;
      border-bottom: 1px solid #a21f3e;
      padding-top: 1.6em;
      padding-bottom: 4px;
      margin: 0 0 0.7em;
    }

    /* ── Job titles ── */
    .cv h3 {
      font-size: 1em;
      font-weight: 700;
      color: #222;
      margin: 1em 0 0.15em;
      border: none;
    }

    .cv h4 {
      font-size: 0.93em;
      font-weight: 700;
      color: #222;
      margin: 0.8em 0 0;
      border: none;
    }

    .cv em { font-style: italic; color: #434343; }
    .cv strong { color: #a21f3e; }

    .cv p { margin: 0.25em 0; }

    .cv ul {
      margin: 0.4em 0 0.6em 1.4em;
      padding: 0;
    }
    .cv ul li { margin-bottom: 0.3em; }

    /* ── Links ── */
    .cv a { color: #a21f3e; text-decoration: none; }
    .cv a:hover { text-decoration: underline; }

    /* DOI / publication links */
    .cv a[href*="doi.org"] {
      color: #674ea7;
      font-size: 0.8em;
      font-weight: 600;
      border: 1px solid #c5b3e8;
      border-radius: 3px;
      padding: 1px 5px;
      white-space: nowrap;
    }
    .cv a[href*="doi.org"]:hover {
      background: #f0ebfa;
      text-decoration: none;
    }

    /* ── Skills ── */
    .cv-skills { margin: 0.2em 0 0.4em; }

    .cv-skill-row {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      margin-bottom: 0.5em;
      flex-wrap: wrap;
    }

    .cv-skill-label {
      font-weight: 700;
      color: #a21f3e;
      font-size: 0.875em;
      white-space: nowrap;
      min-width: 130px;
      padding-top: 3px;
    }

    .cv-tags { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; min-width: 0; }

    .cv-tag {
      background: #f8eaed;
      color: #7a1730;
      border-radius: 3px;
      padding: 2px 8px;
      font-size: 0.8em;
      white-space: nowrap;
    }

    .cv-tag--bold { font-weight: 700; }

    .cv-date {
      float: right;
      font-weight: normal;
      font-style: normal;
      color: #555;
      white-space: nowrap;
      margin-left: 1em;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .cv-header { flex-direction: column-reverse; }
      .cv-photo { width: 72px; height: 72px; }
      .cv h2 { font-size: 0.67em; }
      .cv h3 { font-size: 0.93em; }
      .cv-skill-label { min-width: 90px; }
      .cv { font-size: 0.93em; }
      .cv-skill-label { min-width: 90px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
    <a href="/cv" {% if page.url contains "cv" %}class="active"{% endif %}>CV</a>
    <a href="/poster" {% if page.url contains "poster" %}{% unless page.url contains "posters" %}class="active"{% endunless %}{% endif %}>Poster</a>
    <a href="/posters" {% if page.url contains "posters" %}class="active"{% endif %}>Posters</a>
  </nav>
  <main class="cv">
    {{ content }}
  </main>
  <script data-goatcounter="https://dgruano.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>

  <!-- CV download modal -->
  <div id="cv-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:8px;padding:2rem;max-width:360px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.2);font-family:inherit;">
      <p style="margin:0 0 .5rem;font-size:1.05em;font-weight:600;color:#1a1a1a;">Almost there!</p>
      <p style="margin:0 0 1.2rem;font-size:.9em;color:#555;line-height:1.5;">If you'd like me to know who you are, drop your name, email, or Bluesky handle below. Totally optional — no pressure.</p>
      <input id="cv-modal-input" type="text" placeholder="e.g. Jane, jane@uni.edu, @jane.bsky.social"
        style="width:100%;box-sizing:border-box;padding:.55rem .7rem;border:1px solid #ccc;border-radius:4px;font-size:.9em;margin-bottom:1rem;outline:none;">
      <div style="display:flex;gap:.75rem;align-items:center;">
        <button id="cv-modal-download"
          style="flex:1;padding:.55rem;background:#a21f3e;color:#fff;border:none;border-radius:4px;font-size:.9em;font-weight:600;cursor:pointer;">
          ↓ Download PDF
        </button>
        <a id="cv-modal-skip" href="#" style="font-size:.85em;color:#888;text-decoration:none;white-space:nowrap;">skip</a>
      </div>
    </div>
  </div>

  <script>
    const modal = document.getElementById('cv-modal');
    const input = document.getElementById('cv-modal-input');
    const PDF   = '/assets/CV_DANIEL_GARCIA-RUANO.pdf';

    function triggerDownload() {
      const a = document.createElement('a');
      a.href = PDF; a.download = ''; a.click();
    }

    function recordAndDownload() {
      const val = input.value.trim();
      const path = val ? '/cv-download?from=' + encodeURIComponent(val) : '/cv-download';
      if (window.goatcounter && window.goatcounter.count) {
        window.goatcounter.count({ path });
      }
      modal.style.display = 'none';
      triggerDownload();
    }

    document.querySelector('[data-goatcounter-click="cv-download"]').addEventListener('click', function(e) {
      e.preventDefault();
      modal.style.display = 'flex';
      input.value = '';
      input.focus();
    });

    document.getElementById('cv-modal-download').addEventListener('click', recordAndDownload);
    document.getElementById('cv-modal-skip').addEventListener('click', function(e) {
      e.preventDefault(); recordAndDownload();
    });
    input.addEventListener('keydown', function(e) { if (e.key === 'Enter') recordAndDownload(); });
    modal.addEventListener('click', function(e) { if (e.target === modal) { modal.style.display='none'; triggerDownload(); } });
  </script>
</body>
</html>
