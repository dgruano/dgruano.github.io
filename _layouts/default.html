<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title == "Home" %}{{ site.title }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
  <nav>
    <a href="/" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
    <a href="/cv" {% if page.url contains "cv" %}class="active"{% endif %}>CV</a>
    <a href="/posters" {% if page.url contains "posters" %}class="active"{% endif %}>Posters</a>
  </nav>
  <main>
    {{ content }}
  </main>
</body>
</html>
